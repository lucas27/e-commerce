<main class="flex flex-col h-150 justify-center items-center">
    <section class="flex flex-col border-3 rounded-xl p-10 gap-6">
        <h1 class="text-center">Login</h1>
        <div>
            <label for="email">Email</label><br>
            <input class="border-3 w-80 p-1 pl-2" 
            #email type="text" name="email" placeholder="digite seu email">
        </div>
        <div>
            <label for="password">Senha</label><br>
            <input class="border-3 w-80 p-1 pl-2"
            #password type="password" name="password" placeholder="digite sua senha">
        </div>
        <button class="border-3 p-2 bg-green-500 rounded-xl cursor-pointer" 
        (click)="getValue(email.value, password.value)" type="submit">Enviar</button>
    </section>
</main>
